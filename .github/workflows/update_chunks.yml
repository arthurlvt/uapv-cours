# .github/workflows/update_chunks.yml
#
# Génère automatiquement chunks_all.json à partir des ressources du repo,
# puis le committe si des changements ont été détectés.
#
# Déclencheurs :
#   - Cron quotidien à 3h00 UTC (5h heure française)
#   - Déclenchement manuel depuis l'onglet "Actions" de GitHub

name: 🔄 Mise à jour des chunks RAG

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chunks:
    runs-on: ubuntu-latest

    steps:
      # ── Récupération du code ──────────────────────────────────────────────
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4
        with:
          # Utilise le token par défaut — pas besoin de PAT pour un repo public
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python ────────────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # ── Dépendances ───────────────────────────────────────────────────────
      - name: 📦 Installation des dépendances
        run: pip install pymupdf

      # ── Extraction ────────────────────────────────────────────────────────
      - name: 🔨 Génération de chunks_all.json
        run: |
          python rag_extract.py \
            --input  ./cours           \
            --output ./chunks_all.json \
            --chunk-size 500           \
            --overlap    50

      # ── Commit conditionnel ───────────────────────────────────────────────
      - name: 💾 Commit si des changements ont été détectés
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add chunks_all.json

          # N'ouvre pas un commit vide si rien n'a changé
          if git diff --staged --quiet; then
            echo "✅ chunks_all.json inchangé — aucun commit nécessaire."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore(rag): mise à jour chunks — ${TIMESTAMP} [skip ci]"
            git push
            echo "✅ chunks_all.json mis à jour et poussé."
          fi