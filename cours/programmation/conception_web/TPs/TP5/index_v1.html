<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
        <title>Exemple de page</title>
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9; 
        }
        input[type="submit"],
        input[type="reset"] {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #0056b3;
        }
        .radio-group-genre {
            margin-top: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 4px;
            background-color: #f9f9f9; 
        }
        .radio-group-genre label {
            display: inline-block;
            margin-right: 10px;
        }
        .radio-group-sports {
            margin-top: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 4px;
            background-color: #f9f9f9; 
        }
        .radio-group-sports label {
            display: inline-block;
            margin-right: 10px;
        }
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9; 
        }
        .choix-vile {
            margin-top: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 4px;
            background-color: #f9f9f9; 
        }
        .choix-vile label {
            display: inline-block;
            margin-right: 10px;
        }
    </style>
    <body>
        <h1>Bienvenue sur ce magnifique site</h1>
        <form action="index.html" method="get">
            <label for="nom">Nom : </label>
            <input type="text" id="nom" name="nom"/>

            <label for="prenom">Prénom : </label>
            <input type="text" id="prenom" name="prenom"/>

            <label for="age">Age : </label>
            <input type="number" id="age" name="age"/>

            <label for="email">Email : </label>
            <input type="email" id="email" name="email" list="suggestions"/>
            <datalist id="suggestions">
                <option value="gmail.com"/>
                <option value="yahoo.com"/>
                <option value="hotmail.com"/>
            </datalist>

            <label for="motdepasse">Mot de passe : </label>
            <input type="password" id="motdepasse" name="motdepasse"/>

            <label for="confirmpassword">Confirmer le mot de passe : </label>
            <input type="password" id="confirmpassword" name="confirmpassword"/>

            <div class="radio-group-genre">
                <span><strong>Genre : </strong></span>
                <label><input type="radio" name="genre" value="homme"/> Homme</label>
                <label><input type="radio" name="genre" value="femme"/> Femme</label>
                <label><input type="radio" name="genre" value="autre"/> Autre</label>
            </div>
            <div class="radio-group-sports">
                <span><strong>Sports préférés : </strong></span>
                <label><input type="checkbox" name="sports" value="football"/> Football</label>
                <label><input type="checkbox" name="sports" value="equitation"/> Equitation</label>
                <label><input type="checkbox" name="sports" value="basket"/> Basket</label>
                <label><input type="checkbox" name="sports" value="natation"/> Natation</label>
                <label><input type="checkbox" name="sports" value="velo"/> Vélo</label>
                <label><input type="checkbox" name="sports" value="autre"/> Autre</label>
            </div>

            <label for="commentaires">Autres Informations : </label>
            <textarea id="commentaires" name="commentaires" rows="4" cols="50" placeholder="Entrez vos infos supplémentaires ici..."></textarea>

            <!-- liste déroulante avec le deuxieme choix par defaut -->
             <div class="choix-vile">
                <label for="ville"><strong>Ville : </strong></label>
                <select id="ville" name="ville">
                    <option value="paris">Paris</option>
                    <option value="marseille" selected>Marseille</option>
                    <option value="lyon">Lyon</option>
                    <option value="toulouse">Toulouse</option>
                </select>
             </div>


            <input type="submit" value="Soumettre"/>
            <input type="reset" value="Recommencer"/>

        </form>
    </body>
</html>
